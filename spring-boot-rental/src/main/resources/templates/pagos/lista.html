<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul Car's - Pagos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <div class="sidebar-header mb-4">
                        <h5 class="text-warning">🚗 PAUL CAR'S</h5>
                        <small class="text-muted">Gestión de Alquiler</small>
                    </div>

                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/dashboard}">
                                <i class="bi bi-speedometer2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/vehiculos}">
                                <i class="bi bi-car-front"></i> Vehículos
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/clientes}">
                                <i class="bi bi-people"></i> Clientes
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/alquileres}">
                                <i class="bi bi-calendar-check"></i> Alquileres
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" th:href="@{/pagos}">
                                <i class="bi bi-credit-card"></i> Pagos
                            </a>
                        </li>
                    </ul>

                    <hr class="my-3">

                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link text-danger" th:href="@{/logout}">
                                <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <div>
                        <h1 class="h2">Gestión de Pagos</h1>
                        <small class="text-muted" th:text="'Total Ingresos: $/ ' + ${totalIngresos}"></small>
                    </div>
                    <a href="/pagos/nuevo" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Nuevo Pago
                    </a>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Alquiler ID</th>
                                <th>Cliente</th>
                                <th>Fecha Pago</th>
                                <th>Monto Total</th>
                                <th>Método Pago</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="pago : ${pagos}">
                                <td th:text="${pago.alquiler.idAlquiler}"></td>
                                <td th:text="${pago.alquiler.cliente.nombres} + ' ' + ${pago.alquiler.cliente.apellidos}"></td>
                                <td th:text="${#temporals.format(pago.fechaPago, 'dd/MM/yyyy')}"></td>
                                <td th:text="'$/ ' + ${pago.montoTotal}"></td>
                                <td th:text="${pago.metodoPago.nombreMetodo}"></td>
                                <td>
                                    <span th:if="${pago.estadoPago == 'Pagado'}" class="badge bg-success">Pagado</span>
                                    <span th:unless="${pago.estadoPago == 'Pagado'}" class="badge bg-warning">Pendiente</span>
                                </td>
                                <td>
                                    <a th:href="@{/pagos/editar/{id}(id=${pago.idPago})}" class="btn btn-sm btn-warning">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/pagos/eliminar/{id}(id=${pago.idPago})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Confirmar eliminación?')">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
