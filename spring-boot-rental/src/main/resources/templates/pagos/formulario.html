<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul Car's - Formulario Pagos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <div class="sidebar-header mb-4">
                        <h5 class="text-warning">🚗 PAUL CAR'S</h5>
                        <small class="text-muted">Gestión de Alquiler</small>
                    </div>

                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/dashboard}">
                                <i class="bi bi-speedometer2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/vehiculos}">
                                <i class="bi bi-car-front"></i> Vehículos
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/clientes}">
                                <i class="bi bi-people"></i> Clientes
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/alquileres}">
                                <i class="bi bi-calendar-check"></i> Alquileres
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" th:href="@{/pagos}">
                                <i class="bi bi-credit-card"></i> Pagos
                            </a>
                        </li>
                    </ul>

                    <hr class="my-3">

                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link text-danger" th:href="@{/logout}">
                                <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Formulario de Pagos</h1>
                </div>

                <div class="card">
                    <div class="card-body">
                        <form th:action="${pago.idPago} ? @{/pagos/actualizar/{id}(id=${pago.idPago})} : @{/pagos/guardar}" 
                              method="post" th:object="${pago}">
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Alquiler *</label>
                                    <select class="form-control" th:field="*{alquiler}" required>
                                        <option value="">Seleccione alquiler</option>
                                        <option th:each="alquiler : ${alquileres}" th:value="${alquiler.idAlquiler}" 
                                                th:text="'Alquiler #' + ${alquiler.idAlquiler} + ' - ' + ${alquiler.cliente.nombres}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Método de Pago *</label>
                                    <select class="form-control" th:field="*{metodoPago}" required>
                                        <option value="">Seleccione método</option>
                                        <option th:each="metodo : ${metodos}" th:value="${metodo.idMetodoPago}" 
                                                th:text="${metodo.nombreMetodo}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label">Fecha de Pago *</label>
                                    <input type="date" class="form-control" th:field="*{fechaPago}" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Monto Total *</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{montoTotal}" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Estado *</label>
                                    <select class="form-control" th:field="*{estadoPago}" required>
                                        <option value="">Seleccione estado</option>
                                        <option value="Pagado">Pagado</option>
                                        <option value="Pendiente">Pendiente</option>
                                        <option value="Cancelado">Cancelado</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Comentarios</label>
                                <textarea class="form-control" th:field="*{comentarios}" rows="3"></textarea>
                            </div>

                            <div class="mb-3">
                                <a href="/pagos" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
