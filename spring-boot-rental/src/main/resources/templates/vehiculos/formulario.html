<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul Car's - Formulario Vehículos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <div class="sidebar-header mb-4">
                        <h5 class="text-warning">🚗 PAUL CAR'S</h5>
                        <small class="text-muted">Gestión de Alquiler</small>
                    </div>

                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/dashboard}">
                                <i class="bi bi-speedometer2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" th:href="@{/vehiculos}">
                                <i class="bi bi-car-front"></i> Vehículos
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/clientes}">
                                <i class="bi bi-people"></i> Clientes
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/alquileres}">
                                <i class="bi bi-calendar-check"></i> Alquileres
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/pagos}">
                                <i class="bi bi-credit-card"></i> Pagos
                            </a>
                        </li>
                    </ul>

                    <hr class="my-3">

                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link text-danger" th:href="@{/logout}">
                                <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Formulario de Vehículos</h1>
                </div>

                <div class="card">
                    <div class="card-body">
                        <form th:action="${vehiculo.idVehiculo} ? @{/vehiculos/actualizar/{id}(id=${vehiculo.idVehiculo})} : @{/vehiculos/guardar}" 
                              method="post" th:object="${vehiculo}">
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Placa *</label>
                                    <input type="text" class="form-control" th:field="*{placa}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Color *</label>
                                    <input type="text" class="form-control" th:field="*{color}" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-3">
                                    <label class="form-label">Año *</label>
                                    <input type="number" class="form-control" th:field="*{anio}" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Modelo *</label>
                                    <select class="form-control" th:field="*{modelo}" required>
                                        <option value="">Seleccione modelo</option>
                                        <option th:each="modelo : ${modelos}" th:value="${modelo.idModelo}" 
                                                th:text="${modelo.marca.nombreMarca} + ' ' + ${modelo.nombreModelo}"></option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Tipo *</label>
                                    <select class="form-control" th:field="*{tipo}" required>
                                        <option value="">Seleccione tipo</option>
                                        <option th:each="tipo : ${tipos}" th:value="${tipo.idTipo}" 
                                                th:text="${tipo.nombreTipoVehiculo}"></option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Combustible *</label>
                                    <select class="form-control" th:field="*{combustible}" required>
                                        <option value="">Seleccione</option>
                                        <option th:each="comb : ${combustibles}" th:value="${comb.idCombustible}" 
                                                th:text="${comb.nombreCombustible}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Número Motor *</label>
                                    <input type="text" class="form-control" th:field="*{numeroMotor}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Número VIN *</label>
                                    <input type="text" class="form-control" th:field="*{numeroVin}" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-3">
                                    <label class="form-label">Precio/Día *</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{precioDia}" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Precio/Hora *</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{precioHora}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Estado *</label>
                                    <select class="form-control" th:field="*{estado}" required>
                                        <option value="">Seleccione estado</option>
                                        <option th:each="estado : ${estados}" th:value="${estado.idEstado}" 
                                                th:text="${estado.nombreEstado}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <a href="/vehiculos" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
