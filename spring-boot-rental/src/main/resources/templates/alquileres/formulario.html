<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul Car's - Formulario Alquileres</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <div class="sidebar-header mb-4">
                        <h5 class="text-warning">🚗 PAUL CAR'S</h5>
                        <small class="text-muted">Gestión de Alquiler</small>
                    </div>

                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/dashboard}">
                                <i class="bi bi-speedometer2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/vehiculos}">
                                <i class="bi bi-car-front"></i> Vehículos
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/clientes}">
                                <i class="bi bi-people"></i> Clientes
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" th:href="@{/alquileres}">
                                <i class="bi bi-calendar-check"></i> Alquileres
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/pagos}">
                                <i class="bi bi-credit-card"></i> Pagos
                            </a>
                        </li>
                    </ul>

                    <hr class="my-3">

                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link text-danger" th:href="@{/logout}">
                                <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Formulario de Alquileres</h1>
                </div>

                <div class="card">
                    <div class="card-body">
                        <form th:action="${alquiler.idAlquiler} ? @{/alquileres/actualizar/{id}(id=${alquiler.idAlquiler})} : @{/alquileres/guardar}" 
                              method="post" th:object="${alquiler}">
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Cliente *</label>
                                    <select class="form-control" th:field="*{cliente}" required>
                                        <option value="">Seleccione cliente</option>
                                        <option th:each="cliente : ${clientes}" th:value="${cliente.idCliente}" 
                                                th:text="${cliente.nombres} + ' ' + ${cliente.apellidos}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Vehículo *</label>
                                    <select class="form-control" th:field="*{vehiculo}" required>
                                        <option value="">Seleccione vehículo</option>
                                        <option th:each="vehiculo : ${vehiculos}" th:value="${vehiculo.idVehiculo}" 
                                                th:text="${vehiculo.placa} + ' - ' + ${vehiculo.modelo.nombreModelo}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Licencia de Conducir *</label>
                                    <input type="text" class="form-control" th:field="*{licenciaConducir}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Estado *</label>
                                    <select class="form-control" th:field="*{estadoAlquiler}" required>
                                        <option value="">Seleccione estado</option>
                                        <option th:each="estado : ${estados}" th:value="${estado.idEstadoAlquiler}" 
                                                th:text="${estado.nombreEstado}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-3">
                                    <label class="form-label">Fecha Reserva *</label>
                                    <input type="date" class="form-control" th:field="*{fechaReserva}" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Fecha Inicio *</label>
                                    <input type="date" class="form-control" th:field="*{fechaInicio}" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Fecha Fin Estimada *</label>
                                    <input type="date" class="form-control" th:field="*{fechaFinEstimada}" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Fecha Fin Real</label>
                                    <input type="date" class="form-control" th:field="*{fechaFinReal}">
                                </div>
                            </div>

                            <div class="mb-3">
                                <a href="/alquileres" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
